<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">PhaseWrap-RoPE Stage 4 hardware comparison</title>
  <desc id="desc">A clean bar chart comparing witness and control MAE and rank correlation across four hardware backends.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .axis { stroke: #334155; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .tick { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .value { font: 700 13px Consolas, monospace; fill: #111827; }
      .witness { fill: #0f766e; }
      .control { fill: #b45309; }
      .note { font: 400 12px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="1400" height="700" fill="#ffffff"/>
  <text x="70" y="70" class="title">Stage 4 hardware comparison</text>
  <text x="70" y="102" class="subtitle">Witness and control metrics for completed PhaseWrap-RoPE hardware runs.</text>

  <circle cx="1008" cy="86" r="7" class="witness"/>
  <text x="1022" y="91" class="small">Witness</text>
  <circle cx="1108" cy="86" r="7" class="control"/>
  <text x="1122" y="91" class="small">Control</text>

  <rect x="70" y="140" width="610" height="475" class="panel"/>
  <text x="105" y="182" class="label">Mean absolute error</text>
  <text x="105" y="207" class="small">Lower is better</text>
  <line x1="155" y1="545" x2="625" y2="545" class="axis"/>
  <line x1="155" y1="545" x2="155" y2="250" class="axis"/>
  <line x1="155" y1="475" x2="625" y2="475" class="grid"/>
  <line x1="155" y1="405" x2="625" y2="405" class="grid"/>
  <line x1="155" y1="335" x2="625" y2="335" class="grid"/>
  <line x1="155" y1="265" x2="625" y2="265" class="grid"/>
  <text x="110" y="549" class="tick">0.00</text>
  <text x="110" y="479" class="tick">0.01</text>
  <text x="110" y="409" class="tick">0.02</text>
  <text x="110" y="339" class="tick">0.03</text>
  <text x="110" y="269" class="tick">0.04</text>

  <rect x="188" y="443" width="38" height="102" rx="4" class="witness"/>
  <rect x="230" y="444" width="38" height="101" rx="4" class="control"/>
  <rect x="303" y="517" width="38" height="28" rx="4" class="witness"/>
  <rect x="345" y="443" width="38" height="102" rx="4" class="control"/>
  <rect x="418" y="496" width="38" height="49" rx="4" class="witness"/>
  <rect x="460" y="436" width="38" height="109" rx="4" class="control"/>
  <rect x="533" y="508" width="38" height="37" rx="4" class="witness"/>
  <rect x="575" y="436" width="38" height="109" rx="4" class="control"/>

  <text x="176" y="574" class="small">IBM Kingston</text>
  <text x="292" y="574" class="small">IBM Marrakesh</text>
  <text x="420" y="574" class="small">IBM Fez</text>
  <text x="532" y="574" class="small">IonQ QPU</text>

  <text x="184" y="431" class="value">0.0434</text>
  <text x="226" y="432" class="value">0.2156</text>
  <text x="299" y="505" class="value">0.0119</text>
  <text x="341" y="431" class="value">0.2301</text>
  <text x="414" y="484" class="value">0.0157</text>
  <text x="456" y="424" class="value">0.2204</text>
  <text x="529" y="496" class="value">0.0148</text>
  <text x="571" y="424" class="value">0.2302</text>

  <rect x="720" y="140" width="610" height="475" class="panel"/>
  <text x="755" y="182" class="label">Rank correlation</text>
  <text x="755" y="207" class="small">Higher is better</text>
  <line x1="805" y1="545" x2="1275" y2="545" class="axis"/>
  <line x1="805" y1="545" x2="805" y2="250" class="axis"/>
  <line x1="805" y1="505" x2="1275" y2="505" class="grid"/>
  <line x1="805" y1="445" x2="1275" y2="445" class="grid"/>
  <line x1="805" y1="385" x2="1275" y2="385" class="grid"/>
  <line x1="805" y1="325" x2="1275" y2="325" class="grid"/>
  <line x1="805" y1="265" x2="1275" y2="265" class="grid"/>
  <text x="758" y="549" class="tick">-0.20</text>
  <text x="770" y="509" class="tick">0.00</text>
  <text x="770" y="449" class="tick">0.25</text>
  <text x="770" y="389" class="tick">0.50</text>
  <text x="770" y="329" class="tick">0.75</text>
  <text x="770" y="269" class="tick">1.00</text>

  <rect x="838" y="378" width="38" height="167" rx="4" class="witness"/>
  <rect x="880" y="525" width="38" height="20" rx="4" class="control"/>
  <rect x="953" y="330" width="38" height="215" rx="4" class="witness"/>
  <rect x="995" y="523" width="38" height="22" rx="4" class="control"/>
  <rect x="1068" y="305" width="38" height="240" rx="4" class="witness"/>
  <rect x="1110" y="524" width="38" height="21" rx="4" class="control"/>
  <rect x="1183" y="342" width="38" height="203" rx="4" class="witness"/>
  <rect x="1225" y="523" width="38" height="22" rx="4" class="control"/>

  <text x="826" y="574" class="small">IBM Kingston</text>
  <text x="942" y="574" class="small">IBM Marrakesh</text>
  <text x="1070" y="574" class="small">IBM Fez</text>
  <text x="1182" y="574" class="small">IonQ QPU</text>

  <text x="834" y="366" class="value">0.7812</text>
  <text x="872" y="516" class="value">-0.1513</text>
  <text x="949" y="318" class="value">0.9605</text>
  <text x="987" y="514" class="value">-0.1768</text>
  <text x="1064" y="293" class="value">0.9814</text>
  <text x="1102" y="515" class="value">-0.1693</text>
  <text x="1179" y="330" class="value">0.9086</text>
  <text x="1217" y="514" class="value">-0.1768</text>

  <line x1="70" y1="646" x2="1330" y2="646" stroke="#e2e8f0" stroke-width="2"/>
  <text x="70" y="672" class="note">Figure 3. Completed hardware comparison. IBM runs used 4096 shots; IonQ used 1024 shots.</text>
</svg>
