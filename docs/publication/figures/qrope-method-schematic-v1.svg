<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">QRoPE phase-wrap method schematic</title>
  <desc id="desc">A publication schematic showing positional residuals mapped into modular signed margins and combined into the QRoPE score.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 21px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 12px Inter, Arial, sans-serif; fill: #64748b; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 24; filter: url(#shadow); }
      .pill { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.4; rx: 16; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="90" r="210" fill="#0f766e" opacity="0.06"/>
  <circle cx="150" cy="610" r="220" fill="#f59e0b" opacity="0.07"/>

  <text x="72" y="78" class="title">QRoPE phase-wrap scoring</text>
  <text x="72" y="111" class="subtitle">Residuals are reduced to modular signed margins, then combined into a single bounded score.</text>

  <g transform="translate(76,190)">
    <rect width="210" height="258" class="box"/>
    <rect x="24" y="24" width="92" height="30" class="pill"/>
    <text x="38" y="45" class="tiny">Input</text>
    <text x="24" y="95" class="label">Position residual</text>
    <text x="24" y="128" class="small">Frozen row features</text>
    <path d="M42 184 C72 138, 112 138, 142 184 S200 230, 176 184" stroke="#0f766e" stroke-width="7" fill="none" stroke-linecap="round"/>
    <text x="24" y="232" class="mono">r = p_i - p_j</text>
  </g>

  <path d="M286 318 L386 318" class="line"/>

  <g transform="translate(404,130)">
    <rect width="245" height="190" class="box"/>
    <rect x="24" y="24" width="86" height="30" fill="#ecfeff" stroke="#99f6e4" stroke-width="1.4" rx="16"/>
    <text x="41" y="45" class="tiny">Band 1</text>
    <text x="24" y="92" class="label">mod-8 wrap</text>
    <text x="24" y="126" class="small">Signed margin</text>
    <text x="24" y="164" class="mono">m8</text>
    <circle cx="186" cy="116" r="42" fill="none" stroke="url(#teal)" stroke-width="10"/>
    <path d="M186 116 L218 92" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(404,348)">
    <rect width="245" height="190" class="box"/>
    <rect x="24" y="24" width="92" height="30" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.4" rx="16"/>
    <text x="41" y="45" class="tiny">Band 2</text>
    <text x="24" y="92" class="label">mod-12 wrap</text>
    <text x="24" y="126" class="small">Signed margin</text>
    <text x="24" y="164" class="mono">m12</text>
    <circle cx="186" cy="116" r="42" fill="none" stroke="url(#amber)" stroke-width="10"/>
    <path d="M186 116 L158 86" stroke="#b45309" stroke-width="7" stroke-linecap="round"/>
  </g>

  <path d="M648 225 C734 225, 724 320, 812 320" class="line"/>
  <path d="M648 443 C734 443, 724 320, 812 320" class="line"/>

  <g transform="translate(830,176)">
    <rect width="298" height="302" class="box"/>
    <rect x="24" y="24" width="116" height="30" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4" rx="16"/>
    <text x="38" y="45" class="tiny">Output</text>
    <text x="26" y="96" class="label">QRoPE score</text>
    <text x="26" y="152" class="mono">SQR = m8 × m12</text>
    <text x="26" y="202" class="small">Phase-wrap consistency</text>
    <text x="26" y="232" class="small">A bounded score for the publication evidence lane.</text>
    <line x1="26" y1="258" x2="272" y2="258" stroke="#e2e8f0" stroke-width="2"/>
    <text x="26" y="288" class="tiny">Not framed as a broad quantum-advantage claim.</text>
  </g>
</svg>
