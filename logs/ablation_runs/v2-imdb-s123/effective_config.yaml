run:
  seed: 123
  epochs: 25
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  id: v2-imdb-s123
dataset: imdb
model:
  architecture: qmsan_style
  hidden_dim: 128
  attention_heads: 4
  quantum:
    qubits: 8
    layers: 2
    shots: 2048
backend: sim_local
logging:
  output_root: logs/ablation_runs
  save_checkpoints: true
  save_metrics_json: true
  required_fields:
  - run_id
  - variant
  - dataset
  - seed
  - backend
  - accuracy
  - f1
  - train_loss_final
  - eval_loss
  - qubit_count
  - gate_count_total
  - circuit_depth
  - shot_count
  - noise_model
  - wall_time_sec
  - timestamp_utc
variant:
  id: V2
  name: fixed_gate_quantum_pe
positional_encoding:
  type: fixed_gate_quantum
  enabled: true
  gate_family: rx
  frequencies:
  - 0.125
  - 0.25
  - 0.5
  - 1.0
